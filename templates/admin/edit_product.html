{% extends "base.html" %}

{% block title %}Edit Product - {{ product.name }}{% endblock %}

{% block content %}
<div class="bg-primary text-white py-4 mb-5 shadow-sm">
    <div class="container">
        <h1 class="fw-bold mb-0">Quick Edit: {{ product.name }}</h1>
        <p class="small opacity-75 mb-0">Modified values will be updated instantly across the platform</p>
    </div>
</div>

<div class="container mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="portfolio-card bg-white p-5 border shadow-sm">
                <form action="{{ url_for('admin.edit_product', product_id=product.id) }}" method="POST">
                    <div class="row g-4">
                        <div class="col-md-12">
                            <label class="form-label fw-bold small text-uppercase">Product Name</label>
                            <input type="text" name="name" class="form-control rounded-0" value="{{ product.name }}" required>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-uppercase">Category</label>
                            <select name="category_id" class="form-select rounded-0" required>
                                {% for cat in categories %}
                                <option value="{{ cat.id }}" {% if cat.id == product.category_id %}selected{% endif %}>{{ cat.name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        
                        <div class="col-md-6">
                            <label class="form-label fw-bold small text-uppercase">Supply Type</label>
                            <select name="supply_type" class="form-select rounded-0" required>
                                <option value="Domestic" {% if product.supply_type == 'Domestic' %}selected{% endif %}>Domestic</option>
                                <option value="International" {% if product.supply_type == 'International' %}selected{% endif %}>International</option>
                            </select>
                        </div>

                        <div class="col-md-12">
                            <label class="form-label fw-bold small text-uppercase">Minimum Order Quantity (MOQ)</label>
                            <input type="text" name="moq" class="form-control rounded-0" value="{{ product.moq }}" placeholder="e.g. 5000 KG" required>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-bold small text-uppercase">Product Specifications / Description</label>
                            <textarea name="description" class="form-control rounded-0" rows="10" required>{{ product.description }}</textarea>
                        </div>
                    </div>
                    
                    <div class="d-flex gap-3 mt-5">
                        <button type="submit" class="btn btn-access py-3 px-5 fw-bold">Update Product</button>
                        <a href="{{ url_for('public.product_detail', product_id=product.id) }}" class="btn btn-outline-secondary py-3 px-5">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
