{% extends "base.html" %}

{% block title %}Set New Password - Prospera Exim{% endblock %}

{% block content %}
<section class="py-5 bg-light min-vh-100 d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="portfolio-card bg-white p-5 shadow-sm text-center">
                    <div class="mb-5">
                        <h2 class="fw-bold text-navy">New Credentials</h2>
                        <p class="text-muted small">Define your new institutional password</p>
                    </div>
                    <form method="POST">
                        <div class="mb-5 text-start">
                            <label class="form-label fw-bold small">New Password</label>
                            <input type="password" name="password" class="form-control rounded-0" placeholder="••••••••" required>
                            <div class="form-text small opacity-50">Ensure it is at least 8 characters long for security.</div>
                        </div>
                        <button type="submit" class="btn btn-access w-100 py-3 mb-4">Update & Login</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
