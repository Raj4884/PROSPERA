{% extends "base.html" %}

{% block title %}Forgot Password - Prospera Exim{% endblock %}

{% block content %}
<section class="py-5 bg-light min-vh-100 d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="portfolio-card bg-white p-5 shadow-sm text-center">
                    <div class="mb-5">
                        <h2 class="fw-bold text-navy">Reset Access</h2>
                        <p class="text-muted small">Enter your institutional email to receive a secure link</p>
                    </div>
                    <form method="POST">
                        <div class="mb-5 text-start">
                            <label class="form-label fw-bold small">Registered Email Address</label>
                            <input type="email" name="email" class="form-control rounded-0" placeholder="institutional@enterprise.com" required>
                        </div>
                        <button type="submit" class="btn btn-access w-100 py-3 mb-4">Request Secure Link</button>
                        <div class="text-center">
                            <a href="{{ url_for('auth.login') }}" class="text-muted small text-decoration-none"><i class="fas fa-arrow-left me-2"></i>Back to Login</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
