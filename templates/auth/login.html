{% extends "base.html" %}

{% block title %}Login - Bharat Exim{% endblock %}

{% block content %}
<section class="py-5 bg-light min-vh-100 d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="portfolio-card bg-white p-5 shadow-sm">
                    <div class="text-center mb-5">
                        <h2 class="fw-bold text-navy">Corporate Login</h2>
                        <p class="text-muted small">Prospera Exim Institutional Access</p>
                    </div>
                    <form method="POST">
                        <div class="mb-4">
                            <label class="form-label fw-bold small">Email Address</label>
                            <input type="email" name="email" class="form-control rounded-0" placeholder="institutional@enterprise.com" required>
                        </div>
                        <div class="mb-5">
                            <div class="d-flex justify-content-between">
                                <label class="form-label fw-bold small">Institutional Password</label>
                                <a href="{{ url_for('auth.forgot_password') }}" class="small text-primary fw-bold text-decoration-none">Forgot?</a>
                            </div>
                            <input type="password" name="password" class="form-control rounded-0" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-access w-100 py-3 mb-4">Sign In to Dashboard</button>
                        <div class="text-center">
                            <p class="text-muted small">Request Partner Access? <a href="{{ url_for('auth.register') }}" class="text-primary fw-bold text-decoration-none">Register</a></p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
